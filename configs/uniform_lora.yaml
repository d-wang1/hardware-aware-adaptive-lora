method: uniform

model:
  name: distilbert-base-uncased
  task: sst2

lora:
  target_modules:
    - q_lin
    - v_lin
    - lin1
    - lin2
  rank: 8                  # uniform across all target modules
  total_rank_budget: 192   # n_modules (24 = 6 layers * 4 targets) * rank (8) — shared budget across methods. The mixed q/v_lin (cost 1536) + lin1/lin2 (cost 3840) targets give the hardware-aware allocator non-trivial cost heterogeneity vs the gradient-only ablation.
  alpha_lora: 16           # LoRA scaling factor
  dropout: 0.0

training:
  batch_size: 32
  learning_rate: 2.0e-4
  epochs: 3
  eval_interval: 100
  seed: 42

hardware:
  log_memory: true
  log_wall_clock: true
  log_examples_per_second: true

logging:
  output_dir: results/raw_logs/uniform
  target_accuracy: 0.90
